<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Autograph Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --pending: #3b82f6;   /* Blue */
            --received: #10b981;  /* Green */
            --rts: #ef4444;       /* Red */
            --unsigned: #f59e0b;  /* Yellow */
        }

        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text-main); }
        
        /* Navigation Bar */
        .nav-bar { 
            background: white; 
            padding: 10px 40px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-weight: 700; font-size: 18px; color: #1e293b; }
        .nav-links { display: flex; gap: 20px; }
        .nav-item { 
            color: var(--text-light); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .nav-item:hover { background: #f1f5f9; color: var(--text-main); }
        .nav-item.active { color: var(--primary); background: #eef2ff; }

        .btn-add { 
            background: #1e293b; 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Dashboard Container */
        .container { max-width: 1400px; margin: 30px auto; padding: 0 40px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .stat-label { color: var(--text-light); font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; }

        /* Chart Section */
        .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            min-height: 300px;
        }

        /* Entry Modal (Pop-up) */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(2px);
            z-index: 1000; 
        }
        .modal-content { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: white; 
            width: 500px; 
            border-radius: 12px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            overflow: hidden;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 15px 20px; background: #f8fafc; text-align: right; border-top: 1px solid var(--border); }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 5px; }
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 14px; 
            box-sizing: border-box;
        }

        /* Table Area */
        .data-section { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: var(--text-light); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .bg-pending { background: #eff6ff; color: #1e40af; }
        .bg-received { background: #dcfce7; color: #166534; }
        .bg-rts { background: #fee2e2; color: #991b1b; }
        .bg-unsigned { background: #fef3c7; color: #92400e; }

    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="nav-left">
        <div class="logo">Nelson Autograph Tracking</div>
        <div class="nav-links">
            <div class="nav-item active" onclick="showView('summary')">Summary</div>
            <div class="nav-item" onclick="showView('analytics')">Analytics</div>
            <div class="nav-item" onclick="showView('addresses')">Addresses</div>
            <div class="nav-item" onclick="document.getElementById('csvFile').click()">Import CSV</div>
            <div class="nav-item" onclick="exportCSV()">Export CSV</div>
        </div>
    </div>
    <button class="btn-add" onclick="openAddModal()">+ Add Request</button>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Pending</span>
            <span class="stat-value" id="countPending" style="color: var(--pending)">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Received</span>
            <span class="stat-value" id="countReceived" style="color: var(--received)">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">RTS</span>
            <span class="stat-value" id="countRTS" style="color: var(--rts)">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Unsigned</span>
            <span class="stat-value" id="countUnsigned" style="color: var(--unsigned)">0</span>
        </div>
    </div>

    <div class="charts-row" id="analyticsView">
        <div class="chart-container">
            <canvas id="mainVolumeChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="statusDoughnut"></canvas>
        </div>
    </div>

    <div class="data-section">
        <table>
            <thead>
                <tr>
                    <th>Recipient</th>
                    <th>Category</th>
                    <th>Sent</th>
                    <th>Received</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="mainTableBody">
                </tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin:0; font-size: 18px;">New TTM Request</h2>
            <span style="cursor:pointer; font-size: 24px;" onclick="closeAddModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Name *</label>
                <input id="f_name" placeholder="Name">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="f_role">
                        <option value="Actor">Actor</option>
                        <option value="Director">Director</option>
                        <option value="Comedian">Comedian</option>
                        <option value="Politician">Politician</option>
                        <option value="Producer">Producer</option>
                        <option value="Composer">Composer</option>
                        <option value="Musician">Musician</option>
                        <option value="Athlete">Athlete</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Date Sent</label>
                    <input type="date" id="f_datesent">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Mailing Address</label>
                <textarea id="f_address" rows="3" style="font-family: inherit;"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button onclick="closeAddModal()" style="background:none; border:none; color:var(--text-light); cursor:pointer; margin-right:15px;">Cancel</button>
            <button onclick="addEntry()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:600;">Save Entry</button>
        </div>
    </div>
</div>

<input type="file" id="csvFile" style="display:none;" onchange="uploadCSV()">

<script>
    const sb = window.supabase.createClient("https://aeezsewfoozizduzuidv.supabase.co", "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz");
    let allData = [];
    let doughnutChart;

    async function loadData() {
        const { data: rows } = await sb.from("Tracking").select("*").order('created_at', { ascending: false });
        allData = rows || [];
        renderSummary();
        updateDashboardStats();
    }

    function renderSummary() {
        const tbody = document.getElementById("mainTableBody");
        tbody.innerHTML = allData.map(d => `
            <tr>
                <td style="font-weight:600; color:var(--primary); cursor:pointer;">${d.name}</td>
                <td style="color:var(--text-light)">${d.role_type || '—'}</td>
                <td>${d.date_sent || '—'}</td>
                <td>${d.date_received || '—'}</td>
                <td><span class="badge bg-${d.status}">${d.status.toUpperCase()}</span></td>
            </tr>
        `).join("");
    }

    function updateDashboardStats() {
        const s = { pending: 0, received: 0, rts: 0, unsigned: 0 };
        allData.forEach(d => s[d.status || "pending"]++);
        
        document.getElementById("countPending").innerText = s.pending;
        document.getElementById("countReceived").innerText = s.received;
        document.getElementById("countRTS").innerText = s.rts;
        document.getElementById("countUnsigned").innerText = s.unsigned;

        // Simple doughnut update
        if (doughnutChart) doughnutChart.destroy();
        const ctx = document.getElementById('statusDoughnut').getContext('2d');
        doughnutChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Pending', 'Received', 'RTS', 'Unsigned'],
                datasets: [{
                    data: [s.pending, s.received, s.rts, s.unsigned],
                    backgroundColor: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b'],
                    borderWidth: 0,
                    cutout: '70%'
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    function openAddModal() { document.getElementById("addModal").style.display = "block"; }
    function closeAddModal() { document.getElementById("addModal").style.display = "none"; }

    async function addEntry() {
        const name = document.getElementById("f_name").value;
        if(!name) return alert("Name is required");

        await sb.from("Tracking").insert([{
            name: name,
            address: document.getElementById("f_address").value,
            role_type: document.getElementById("f_role").value,
            date_sent: document.getElementById("f_datesent").value || null,
            status: "pending"
        }]);

        closeAddModal();
        loadData();
    }

    // Placeholder for view switching
    function showView(view) { console.log("Switching to", view); }

    loadData();
</script>
</body>
</html>
