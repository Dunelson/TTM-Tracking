<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autograph Vault | J. Nelson Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #818cf8;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --pending: #38bdf8;
            --received: #4ade80;
            --rts: #fb7185;
            --gold: #fbbf24;
            --success-row: rgba(74, 222, 128, 0.05);
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text); overflow-x: hidden; }
        
        /* Navigation */
        .nav-bar { 
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-weight: 900; font-size: 18px; color: var(--primary); letter-spacing: 1.5px; text-transform: uppercase; }
        .nav-links { display: flex; gap: 10px; }
        .nav-item { 
            color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer;
            padding: 8px 16px; border-radius: 8px; transition: 0.2s;
        }
        .nav-item.active { color: var(--text); background: var(--border); }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 40px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-label { color: var(--text-dim); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 26px; font-weight: 800; display: block; margin-top: 5px; font-family: 'JetBrains Mono'; }

        /* Data Display */
        .data-container { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .controls { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .search-input { flex: 1; background: var(--bg-dark); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; outline: none; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: rgba(0,0,0,0.2); color: var(--text-dim); font-size: 11px; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
        
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        /* Dynamic Row Styles */
        .row-received { background-color: var(--success-row) !important; border-left: 4px solid var(--received); }
        .gold-star { color: var(--gold); margin-right: 8px; font-size: 14px; display: inline-block; animation: starPulse 2s infinite ease-in-out; }
        @keyframes starPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); text-shadow: 0 0 5px var(--gold); } }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: none; }
        .badge-ttm { background: rgba(129, 140, 248, 0.2); color: var(--primary); }
        .badge-buy { background: rgba(251, 191, 36, 0.2); color: var(--gold); }
        .item-note { color: var(--text-dim); font-style: italic; font-size: 11px; display: block; margin-top: 4px; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); width: 550px; border-radius: 16px; padding: 30px; border: 1px solid var(--border); }
        
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        input, select, textarea { background: var(--bg-dark); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; width: 100%; margin-top: 5px; box-sizing: border-box; font-family: inherit; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="nav-left">
        <div class="logo">Autograph Vault</div>
        <div class="nav-links">
            <div id="nav-summary" class="nav-item active" onclick="switchView('summary')">SUMMARY</div>
            <div id="nav-stats" class="nav-item" onclick="switchView('stats')">STATS</div>
            <div id="nav-addresses" class="nav-item" onclick="switchView('addresses')">ADDRESSES</div>
        </div>
    </div>
    <button class="btn-primary" onclick="toggleModal('addModal', true)">+ NEW ITEM</button>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card" style="border-top: 3px solid var(--primary)"><span class="stat-label">Total Collection</span><span class="stat-value" id="countTotal">0</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--received)"><span class="stat-label">Successes</span><span class="stat-value" id="countSuccess" style="color:var(--received)">0</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--pending)"><span class="stat-label">TTM Pending</span><span class="stat-value" id="countPending" style="color:var(--pending)">0</span></div>
        <div class="stat-card" style="border-top: 3px solid var(--gold)"><span class="stat-label">Acquisition Mix</span><span class="stat-value" id="mixLabel" style="font-size:14px; margin-top:12px;">—</span></div>
    </div>

    <div id="view-summary" class="view-section active">
        <div class="data-container">
            <div class="controls">
                <input type="text" class="search-input" id="searchBar" placeholder="Search by name, item, or source..." oninput="renderTable()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th onclick="setSort('name')">Recipient ↕</th>
                        <th onclick="setSort('source')">Source ↕</th>
                        <th onclick="setSort('role_type')">Category ↕</th>
                        <th onclick="setSort('status')">Status ↕</th>
                        <th onclick="setSort('wait_time')">Wait ↕</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="mainTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-stats" class="view-section">
        <div class="charts-row">
            <div class="stat-card"><h3 style="margin-top:0">STATUS MIX</h3><canvas id="statusDoughnut"></canvas></div>
            <div class="stat-card"><h3 style="margin-top:0">CATEGORY VOLUME</h3><canvas id="categoryBar"></canvas></div>
        </div>
    </div>

    <div id="view-addresses" class="view-section">
        <div class="data-container">
            <table>
                <thead>
                    <tr><th onclick="setSort('name')">Name ↕</th><th>Address</th></tr>
                </thead>
                <tbody id="addressTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <h2 style="margin:0 0 20px 0; color:var(--primary)">Add to Collection</h2>
        <div style="margin-bottom:15px">
            <label class="stat-label">Name</label>
            <input id="f_name" placeholder="Name of signer">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px">
            <div>
                <label class="stat-label">Source</label>
                <select id="f_source">
                    <option value="TTM">TTM Request</option>
                    <option value="Purchased">Purchased</option>
                    <option value="In-Person">In-Person</option>
                </select>
            </div>
            <div>
                <label class="stat-label">Category</label>
                <select id="f_role">
                    <option>Actor</option><option>Director</option><option>Comedian</option>
                    <option>Politician</option><option>Producer</option><option>Composer</option>
                    <option>Musician</option><option>Athlete</option><option>Other</option>
                </select>
            </div>
        </div>
        <div style="margin-bottom:15px">
            <label class="stat-label">Item Description</label>
            <input id="f_item" placeholder="e.g. 4x6 Custom Art Print, 1992 Topps Card">
        </div>
        <div style="margin-bottom:20px">
            <label class="stat-label">Mailing Address (If TTM)</label>
            <textarea id="f_address" rows="3" placeholder="Address used for request"></textarea>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="toggleModal('addModal', false)" style="background:none; color:var(--text-dim); cursor:pointer; border:none;">CANCEL</button>
            <button onclick="addEntry()" class="btn-primary">SAVE ENTRY</button>
        </div>
    </div>
</div>

<script>
    const sb = window.supabase.createClient("https://aeezsewfoozizduzuidv.supabase.co", "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz");
    let allData = [];
    let sortState = { col: 'created_at', dir: 'desc' };
    let charts = {};

    async function loadData() {
        const { data } = await sb.from("Tracking").select("*");
        allData = data || [];
        renderTable();
        updateStats();
        if(document.getElementById('view-stats').classList.contains('active')) renderCharts();
    }

    function calculateWait(d) {
        if (!d.date_sent || d.source === 'Purchased') return 0;
        const end = d.date_received ? new Date(d.date_received) : new Date();
        return Math.floor((end - new Date(d.date_sent)) / (1000 * 60 * 60 * 24));
    }

    function renderTable() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        let filtered = allData.filter(d => 
            d.name?.toLowerCase().includes(query) || 
            d.item_type?.toLowerCase().includes(query) ||
            d.source?.toLowerCase().includes(query)
        );
        
        filtered.sort((a, b) => {
            let vA, vB;
            if (sortState.col === 'wait_time') {
                vA = calculateWait(a); vB = calculateWait(b);
                return sortState.dir === 'asc' ? vA - vB : vB - vA;
            }
            if (sortState.col === 'status') {
                const getWeight = (i) => (i.source === 'Purchased' || i.status === 'received') ? 1 : (i.status === 'pending' ? 2 : 3);
                vA = getWeight(a); vB = getWeight(b);
                return sortState.dir === 'asc' ? vA - vB : vB - vA;
            }
            vA = (a[sortState.col] || '').toString().toLowerCase();
            vB = (b[sortState.col] || '').toString().toLowerCase();
            return sortState.dir === 'asc' ? vA.localeCompare(vB) : vB.localeCompare(vA);
        });

        document.getElementById("mainTableBody").innerHTML = filtered.map(d => {
            const isSuccess = d.status === 'received' || d.source === 'Purchased';
            return `
                <tr class="${isSuccess ? 'row-received' : ''}">
                    <td>${isSuccess ? '<span class="gold-star">★</span>' : ''}<strong>${d.name}</strong></td>
                    <td><span class="badge ${d.source==='Purchased'?'badge-buy':'badge-ttm'}">${d.source||'TTM'}</span></td>
                    <td>${d.role_type}<span class="item-note">${d.item_type || '—'}</span></td>
                    <td>
                        <select onchange="updateStatus('${d.id}', this.value)" class="badge" style="background:var(--bg-dark); color:white; border:1px solid var(--border); cursor:pointer">
                            <option value="pending" ${d.status==='pending'?'selected':''}>Pending</option>
                            <option value="received" ${d.status==='received'?'selected':''}>Received</option>
                            <option value="rts" ${d.status==='rts'?'selected':''}>RTS</option>
                        </select>
                    </td>
                    <td><span style="font-family: 'JetBrains Mono'; opacity:0.8">${d.source==='Purchased' ? '—' : calculateWait(d)+'d'}</span></td>
                    <td><button onclick="deleteEntry('${d.id}')" style="color:var(--rts); background:none; border:none; cursor:pointer;">✕</button></td>
                </tr>
            `;
        }).join("");

        document.getElementById("addressTableBody").innerHTML = filtered.map(d => `
            <tr><td><b>${d.name}</b></td><td style="color:var(--text-dim); font-family: 'JetBrains Mono'">${d.address || '—'}</td></tr>
        `).join("");
    }

    async function addEntry() {
        const source = document.getElementById("f_source").value;
        const name = document.getElementById("f_name").value;
        if(!name) return alert("Please enter a name");

        const entry = {
            name: name,
            source: source,
            role_type: document.getElementById("f_role").value,
            item_type: document.getElementById("f_item").value,
            address: document.getElementById("f_address").value,
            status: (source === 'Purchased' ? 'received' : 'pending'),
            date_sent: (source !== 'Purchased' ? new Date().toISOString().split('T')[0] : null)
        };
        
        await sb.from("Tracking").insert([entry]);
        // Reset and reload
        document.getElementById("f_name").value = "";
        document.getElementById("f_item").value = "";
        document.getElementById("f_address").value = "";
        toggleModal('addModal', false);
        loadData();
    }

    async function updateStatus(id, status) {
        const date_received = (status === 'received') ? new Date().toISOString().split('T')[0] : null;
        await sb.from("Tracking").update({ status, date_received }).eq("id", id);
        loadData();
    }

    function updateStats() {
        const successes = allData.filter(d => d.status === 'received' || d.source === 'Purchased').length;
        const buyCount = allData.filter(d => d.source === 'Purchased').length;
        document.getElementById('countTotal').innerText = allData.length;
        document.getElementById('countSuccess').innerText = successes;
        document.getElementById('countPending').innerText = allData.filter(d => d.status === 'pending').length;
        document.getElementById('mixLabel').innerText = `${allData.length - buyCount} TTM / ${buyCount} Buy`;
    }

    function renderCharts() {
        const s = { pending: 0, received: 0, rts: 0 };
        const cats = {};
        allData.forEach(d => { 
            const statKey = (d.source === 'Purchased' || d.status === 'received') ? 'received' : d.status;
            s[statKey]++; 
            cats[d.role_type] = (cats[d.role_type] || 0) + 1;
        });
        
        Chart.defaults.color = '#94a3b8';
        if(charts.d) charts.d.destroy();
        charts.d = new Chart(document.getElementById('statusDoughnut'), { 
            type: 'doughnut', 
            data: { labels: ['Pending', 'Success', 'RTS'], datasets: [{ data: [s.pending, s.received, s.rts], backgroundColor: ['#38bdf8', '#4ade80', '#fb7185'], borderWidth: 0 }] }
        });
        
        if(charts.b) charts.b.destroy();
        charts.b = new Chart(document.getElementById('categoryBar'), { 
            type: 'bar', 
            data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: '#818cf8', borderRadius: 5 }] }, 
            options: { indexAxis: 'y', plugins: { legend: { display: false } } }
        });
    }

    function setSort(col) { sortState.dir = (sortState.col === col && sortState.dir === 'asc') ? 'desc' : 'asc'; sortState.col = col; renderTable(); }
    function switchView(v) { document.querySelectorAll('.view-section, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById(`view-${v}`).classList.add('active'); document.getElementById(`nav-${v}`).classList.add('active'); if(v==='stats') renderCharts(); }
    function toggleModal(id, show) { document.getElementById(id).style.display = show ? "block" : "none"; }
    async function deleteEntry(id) { if(confirm("Permanently delete this item?")) { await sb.from("Tracking").delete().eq("id", id); loadData(); } }

    loadData();
</script>
</body>
</html>
