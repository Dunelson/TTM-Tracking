<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autograph Tracking | Collector's Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #818cf8;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --pending: #38bdf8;
            --received: #4ade80;
            --rts: #fb7185;
            --gold: #fbbf24;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text); }
        
        .nav-bar { 
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 18px; color: var(--primary); letter-spacing: 1.5px; text-transform: uppercase; }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 40px; }

        /* Focused Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-label { color: var(--text-dim); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 26px; font-weight: 800; display: block; margin-top: 5px; font-family: 'JetBrains Mono'; }

        .data-container { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .controls { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .search-input { flex: 1; background: var(--bg-dark); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; outline: none; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: rgba(0,0,0,0.2); color: var(--text-dim); font-size: 11px; text-transform: uppercase; cursor: pointer; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .row-received { background-color: rgba(74, 222, 128, 0.05) !important; border-left: 4px solid var(--received); }
        .gold-star { color: var(--gold); margin-right: 8px; font-size: 14px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge-ttm { background: rgba(129, 140, 248, 0.2); color: var(--primary); }
        .badge-buy { background: rgba(251, 191, 36, 0.2); color: var(--gold); }
        
        .item-note { color: var(--text-dim); font-style: italic; font-size: 12px; display: block; margin-top: 4px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); width: 550px; border-radius: 16px; padding: 35px; border: 1px solid var(--border); }
        
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        input, select, textarea { background: var(--bg-dark); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; width: 100%; margin-top: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="logo">Autograph Tracking</div>
    <button class="btn-primary" onclick="toggleModal('addModal', true)">+ ADD TO COLLECTION</button>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-label">Total Items</span><span class="stat-value" id="countTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">Successes</span><span class="stat-value" id="countSuccess" style="color:var(--received)">0</span></div>
        <div class="stat-card"><span class="stat-label">TTM Pending</span><span class="stat-value" id="countPending" style="color:var(--pending)">0</span></div>
        <div class="stat-card"><span class="stat-label">Acquisition Mix</span><span class="stat-value" id="mixLabel" style="font-size:14px; margin-top:12px;">TTM / Purchased</span></div>
    </div>

    <div class="data-container">
        <div class="controls"><input type="text" class="search-input" id="searchBar" placeholder="Search by name or item type..." oninput="renderTable()"></div>
        <table>
            <thead>
                <tr>
                    <th>Recipient</th>
                    <th>Acquired Via</th>
                    <th>Item Details</th>
                    <th>Status</th>
                    <th>Wait Time</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="mainTableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <h2 style="margin:0 0 25px 0;">Add Collection Item</h2>
        
        <div style="margin-bottom:15px">
            <label class="stat-label">Name</label>
            <input id="f_name" placeholder="e.g. Leah Remini">
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px">
            <div>
                <label class="stat-label">Acquisition Source</label>
                <select id="f_source">
                    <option value="TTM">TTM Request</option>
                    <option value="Purchased">Purchased / Shop</option>
                    <option value="IP">In-Person</option>
                </select>
            </div>
            <div>
                <label class="stat-label">Category</label>
                <select id="f_role">
                    <option>Actor</option><option>Athlete</option><option>Musician</option><option>Other</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom:20px">
            <label class="stat-label">What was signed? (Photo, Card, etc.)</label>
            <input id="f_item" placeholder="e.g. Custom 4x6 Art Print">
        </div>

        <div style="display:flex; justify-content:flex-end; gap:12px;">
            <button onclick="toggleModal('addModal', false)" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">CANCEL</button>
            <button onclick="addEntry()" class="btn-primary">ADD TO VAULT</button>
        </div>
    </div>
</div>

<script>
    const sb = window.supabase.createClient("https://aeezsewfoozizduzuidv.supabase.co", "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz");
    let allData = [];

    async function loadData() {
        const { data } = await sb.from("Tracking").select("*");
        allData = data || [];
        renderTable();
        updateStats();
    }

    function renderTable() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        const filtered = allData.filter(d => d.name?.toLowerCase().includes(query) || d.item_type?.toLowerCase().includes(query));
        
        document.getElementById("mainTableBody").innerHTML = filtered.map(d => {
            const isSuccess = d.status === 'received' || d.source === 'Purchased';
            const wait = calculateWait(d.date_sent, d.date_received);
            
            return `
                <tr class="${isSuccess ? 'row-received' : ''}">
                    <td>
                        ${isSuccess ? '<span class="gold-star">★</span>' : ''}
                        <strong>${d.name}</strong>
                    </td>
                    <td><span class="badge ${d.source === 'Purchased' ? 'badge-buy' : 'badge-ttm'}">${d.source || 'TTM'}</span></td>
                    <td>
                        ${d.role_type}
                        <span class="item-note">${d.item_type || '—'}</span>
                    </td>
                    <td>
                        <select onchange="updateStatus('${d.id}', this.value)" style="width:auto; padding:4px; font-size:11px;">
                            <option value="pending" ${d.status==='pending'?'selected':''}>Pending</option>
                            <option value="received" ${d.status==='received'?'selected':''}>Received</option>
                            <option value="rts" ${d.status==='rts'?'selected':''}>RTS</option>
                        </select>
                    </td>
                    <td>${d.source === 'Purchased' ? '—' : wait + 'd'}</td>
                    <td><button onclick="deleteEntry('${d.id}')" style="color:var(--rts); border:none; background:none; cursor:pointer;">✕</button></td>
                </tr>
            `;
        }).join("");
    }

    async function addEntry() {
        const source = document.getElementById("f_source").value;
        const entry = {
            name: document.getElementById("f_name").value,
            source: source,
            role_type: document.getElementById("f_role").value,
            item_type: document.getElementById("f_item").value,
            status: (source === 'Purchased' ? 'received' : 'pending'),
            date_sent: (source === 'TTM' ? new Date().toISOString().split('T')[0] : null)
        };

        await sb.from("Tracking").insert([entry]);
        toggleModal('addModal', false);
        loadData();
    }

    function calculateWait(sent, received) {
        if (!sent) return 0;
        const end = received ? new Date(received) : new Date();
        return Math.floor((end - new Date(sent)) / (1000 * 60 * 60 * 24));
    }

    function updateStats() {
        const successes = allData.filter(d => d.status === 'received' || d.source === 'Purchased').length;
        const ttmCount = allData.filter(d => d.source !== 'Purchased').length;
        const buyCount = allData.filter(d => d.source === 'Purchased').length;

        document.getElementById('countTotal').innerText = allData.length;
        document.getElementById('countSuccess').innerText = successes;
        document.getElementById('countPending').innerText = allData.filter(d => d.status === 'pending').length;
        document.getElementById('mixLabel').innerText = `${ttmCount} TTM / ${buyCount} Purchased`;
    }

    async function updateStatus(id, status) {
        await sb.from("Tracking").update({ status, date_received: status==='received' ? new Date().toISOString().split('T')[0] : null }).eq("id", id);
        loadData();
    }

    async function deleteEntry(id) { if(confirm("Delete item?")) { await sb.from("Tracking").delete().eq("id", id); loadData(); } }
    function toggleModal(id, show) { document.getElementById(id).style.display = show ? "block" : "none"; }

    loadData();
</script>
</body>
</html>
