<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autograph Vault Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --primary: #818cf8;
            --border: #334155; --text: #f1f5f9; --text-dim: #94a3b8;
            --received: #4ade80; --rts: #fb7185; --pending: #38bdf8;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text); -webkit-tap-highlight-color: transparent; }
        .nav-bar { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 14px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px;}
        .nav-menu { display: flex; gap: 8px; }
        .nav-item { color: var(--text-dim); text-decoration: none; font-size: 10px; font-weight: 800; cursor: pointer; padding: 8px 12px; border-radius: 20px; transition: 0.2s; background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--text); background: var(--primary); }

        .container { padding: 0 15px 100px 15px; max-width: 1000px; margin: 0 auto; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .stat-card { background: var(--card-bg); padding: 12px 5px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 16px; font-weight: 800; font-family: 'JetBrains Mono'; display: block; color: var(--primary); }
        .stat-card small { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }

        .control-panel { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .filter-tabs { display: flex; gap: 5px; background: #000; padding: 5px; border-radius: 10px; margin-bottom: 12px; }
        .tab { flex: 1; text-align: center; padding: 8px; font-size: 11px; font-weight: 800; color: var(--text-dim); cursor: pointer; border-radius: 6px; }
        .tab.active { background: var(--bg-dark); color: var(--primary); }
        .sort-select { background: var(--bg-dark); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-size: 12px; width: 100%; margin-bottom: 10px; }

        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .item-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
        .item-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; position: relative; cursor: pointer; }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; display: block; }
        .card-content { padding: 10px; }
        .card-date { font-size: 9px; color: var(--text-dim); display: block; margin-top: 3px; }

        .p-info-section { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .field-label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 6px; }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; font-size: 13px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card-bg); border-radius: 15px; padding: 25px; width: 100%; max-width: 400px; }
        select, input, textarea { background: var(--bg-dark); border: 1px solid var(--border); color: white; border-radius: 8px; padding: 12px; font-family: inherit; font-size: 14px; }
        
        .p-image-section { position: relative; width: 100%; }
        .p-img-frame { width: 100%; max-height: 400px; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .p-img-frame img { width: 100%; height: 100%; max-height: 400px; display: block; object-fit: contain; }

        .photo-strip { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0; }
        .strip-img-wrap { position: relative; flex-shrink: 0; }
        .strip-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); cursor: pointer; }
        .del-btn { position: absolute; top: -5px; right: -5px; background: var(--rts); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; cursor: pointer; z-index: 5; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="logo">Vault Pro</div>
    <div class="nav-menu">
        <div id="btn-summary" class="nav-item active" onclick="switchView('summary')">COLLECTION</div>
        <div id="btn-stats" class="nav-item" onclick="switchView('stats')">STATS</div>
        <div id="btn-addresses" class="nav-item" onclick="switchView('addresses')">LIST</div>
    </div>
</nav>

<div class="container">
    <div id="view-summary">
        <div class="stats-grid">
            <div class="stat-card"><small>Total</small><span class="stat-value" id="main-total">0</span></div>
            <div class="stat-card"><small>Rec'd</small><span class="stat-value" style="color:var(--received)" id="main-success">0</span></div>
            <div class="stat-card"><small>Pend</small><span class="stat-value" style="color:var(--pending)" id="main-pending">0</span></div>
            <div class="stat-card"><small>Avg Days</small><span class="stat-value" id="main-avg">0</span></div>
        </div>
        <div class="control-panel">
            <div class="filter-tabs">
                <div class="tab active" onclick="setFilter('all', this)">ALL</div>
                <div class="tab" onclick="setFilter('pending', this)">PENDING</div>
                <div class="tab" onclick="setFilter('received', this)">RECEIVED</div>
            </div>
            <select class="sort-select" onchange="setSort(this.value)">
                <option value="name">Sort by: Name (A-Z)</option>
                <option value="sent">Sort by: Date Sent (Newest)</option>
                <option value="received">Sort by: Date Received (Newest)</option>
            </select>
            <div style="display:flex; gap:10px;">
                <input type="text" id="searchBar" style="flex:1;" class="sort-select" placeholder="Search collection..." oninput="renderGallery()">
                <button onclick="toggleModal('addModal', true)" style="background:var(--primary); border:none; border-radius:10px; width:48px; color:white; font-size:20px; cursor:pointer;">+</button>
            </div>
        </div>
        <div class="item-grid" id="galleryGrid"></div>
    </div>

    <div id="view-profile" style="display:none;">
        <button onclick="switchView('summary')" style="background:none; border:none; color:var(--primary); padding:15px 0; font-weight:800; cursor:pointer; font-size:13px;">← BACK TO VAULT</button>
        <div style="display:grid; grid-template-columns: 1fr; gap:20px;">
             <div class="p-image-section">
                <div class="p-img-frame"><img id="p-img" src=""></div>
                <div id="p-photo-strip" class="photo-strip"></div>
                <label class="btn-primary" style="display:block; text-align:center; cursor:pointer;">
                    + UPLOAD PHOTO <input type="file" accept="image/*" onchange="uploadToStorage(event)" style="display:none">
                </label>
            </div>
            <div class="p-info-section">
                <h1 id="p-name" style="margin:0 0 10px 0; font-size:28px;"></h1>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                    <div><span class="field-label">Role</span><input type="text" id="p-role-input" onchange="updateField('role_type', this.value)" style="width:100%;"></div>
                    <div><span class="field-label">Known For</span><input type="text" id="p-known-input" onchange="updateField('known_for', this.value)" style="width:100%;"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                    <div><span class="field-label">Status</span><select id="p-status-select" onchange="updateField('status', this.value)" style="width:100%;"></select></div>
                    <div><span class="field-label">Source</span><select id="p-source-select" onchange="updateField('source', this.value)" style="width:100%;"></select></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                    <div><span class="field-label">Date Sent</span><input type="date" id="p-sent-date" onchange="updateField('date_sent', this.value)" style="width:100%; box-sizing:border-box;"></div>
                    <div><span class="field-label">Date Received</span><input type="date" id="p-received-date" onchange="updateField('date_received', this.value)" style="width:100%; box-sizing:border-box;"></div>
                </div>
                <div class="field-group">
                    <span class="field-label">Address / Notes</span>
                    <textarea id="p-notes" rows="5" onchange="updateField('address', this.value)" style="width:100%; box-sizing:border-box;"></textarea>
                </div>
                <button onclick="deleteEntry()" style="color:var(--rts); background:none; border:none; width:100%; margin-top:20px; cursor:pointer; font-size:11px;">DELETE PERMANENTLY</button>
            </div>
        </div>
    </div>

    <div id="view-stats" style="display:none;">
        <h2 style="margin-top:20px;">Success Metrics</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
            <div class="stat-card" style="padding:20px;"><small>Success Rate</small><div id="stat-rate" style="font-size:32px; font-weight:800; color:var(--received);">0%</div></div>
            <div class="stat-card" style="padding:20px;"><small>Avg Turnaround</small><div id="stat-avg-large" style="font-size:32px; font-weight:800; color:var(--primary);">0</div><small>Days</small></div>
        </div>
        <div style="background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid var(--border);"><canvas id="chartStatus" style="max-height:300px;"></canvas></div>
    </div>

    <div id="view-addresses" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
            <h2>Master List</h2>
            <div style="display:flex; gap:8px;">
                <button onclick="exportToCSV()" style="background:var(--card-bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:10px; font-weight:800; cursor:pointer;">📥 EXPORT ALL</button>
                <label style="background:var(--primary); color:white; padding:8px 12px; border-radius:8px; font-size:10px; font-weight:800; cursor:pointer;">
                    📤 IMPORT/SYNC CSV
                    <input type="file" id="csvFileInput" accept=".csv" onchange="handleCSVUpload(event)" style="display:none">
                </label>
            </div>
        </div>
        <div id="addressList" style="margin-top:20px;"></div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <h2>New Tracker</h2>
        <input id="f_name" placeholder="Signer Name" style="width:100%; margin-bottom:12px;">
        <input id="f_role" placeholder="Bio/Role" style="width:100%; margin-bottom:12px;">
        <textarea id="f_address" placeholder="Address/Notes" style="width:100%; margin-bottom:15px;" rows="3"></textarea>
        <button onclick="addEntry()" class="btn-primary">CREATE RECORD</button>
        <button onclick="toggleModal('addModal', false)" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    const sb = window.supabase.createClient("https://aeezsewfoozizduzuidv.supabase.co", "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz");
    let allData = [], currentFilter = 'all', currentSort = 'name', currentItem = null, chartInstance = null;

    async function loadData() {
        const { data, error } = await sb.from("Tracking").select("*");
        if (error) return;
        allData = data || [];
        calculateStats();
        renderGallery();
        renderAddressTable();
    }

    // EXCEL-PROOF CSV ENGINE: Automatically handles commas, quotes, line returns, and truncations
    function parseExcelCSV(text) {
        const lines = [];
        let row = [""];
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',') {
                if (inQuotes) { row[row.length - 1] += c; }
                else { row.push(""); }
            } else if (c === '\r' || c === '\n') {
                if (inQuotes) { row[row.length - 1] += c; }
                else {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row.map(field => field.trim()));
                    row = [""];
                }
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== "") { lines.push(row.map(field => field.trim())); }
        return lines;
    }

    // Normalizes alternative date string styles directly into ISO format (YYYY-MM-DD)
    function cleanCSVDate(dateStr) {
        if (!dateStr || dateStr.toLowerCase().includes('#') || dateStr.trim() === "") return null;
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toISOString().split('T')[0];
    }

    async function handleCSVUpload(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            const parsedLines = parseExcelCSV(e.target.result);
            if (parsedLines.length < 2) return;

            // Strip hidden characters or white spaces from raw column blocks
            const headers = parsedLines[0].map(h => h.toLowerCase().replace(/[^a-z0-9_]/g, ''));
            const syncPayload = [];

            const validColumns = ['name', 'role_type', 'known_for', 'address', 'status', 'date_sent', 'date_received', 'source'];

            for (let i = 1; i < parsedLines.length; i++) {
                const values = parsedLines[i];
                if (values.length === 0 || (values.length === 1 && values[0] === "")) continue;
                
                const entry = {};
                headers.forEach((h, idx) => {
                    let val = values[idx];
                    // Map truncated column name variant back safely if necessary
                    if (h === 'date_rece' || h === 'datereceived' || h === 'date_received') h = 'date_received';
                    if (h === 'date_sen' || h === 'datesent' || h === 'date_sent') h = 'date_sent';

                    if (validColumns.includes(h)) {
                        if (h === 'date_sent' || h === 'date_received') {
                            entry[h] = cleanCSVDate(val);
                        } else {
                            entry[h] = val || null;
                        }
                    }
                });

                if (entry.name) {
                    if (!entry.status) entry.status = 'pending';
                    syncPayload.push(entry);
                }
            }

            if (syncPayload.length) {
                const { error } = await sb.from("Tracking").upsert(syncPayload, { onConflict: 'name' });
                if (error) {
                    alert("Sync failed. Check column headers.");
                    console.error(error);
                } else {
                    alert(`Sync Success! Processed ${syncPayload.length} records.`);
                    loadData();
                }
            }
        };
        reader.readAsText(file);
    }

    function exportToCSV() {
        const headers = ["name", "role_type", "known_for", "address", "status", "date_sent", "date_received", "source"];
        const rows = allData.map(d => headers.map(h => `"${(d[h] || '').toString().replace(/"/g, '""')}"`).join(","));
        const csv = headers.join(",") + "\n" + rows.join("\n");
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "vault_export.csv";
        link.click();
    }

    function calculateStats() {
        const received = allData.filter(d => d.status === 'received');
        const daysArray = received.filter(d => d.date_sent && d.date_received).map(d => (new Date(d.date_received) - new Date(d.date_sent)) / 86400000);
        const avg = daysArray.length ? Math.round(daysArray.reduce((a,b)=>a+b,0)/daysArray.length) : 0;
        
        document.getElementById('main-total').innerText = allData.length;
        document.getElementById('main-success').innerText = received.length;
        document.getElementById('main-pending').innerText = allData.filter(d => d.status === 'pending').length;
        document.getElementById('main-avg').innerText = avg;
        
        if(document.getElementById('stat-rate')) {
            document.getElementById('stat-rate').innerText = (allData.length ? Math.round((received.length / allData.length) * 100) : 0) + "%";
            document.getElementById('stat-avg-large').innerText = avg;
        }
    }

    function renderAddressTable() {
        const sorted = [...allData].sort((a,b) => a.name.localeCompare(b.name));
        document.getElementById("addressList").innerHTML = sorted.map(d => `
            <div onclick="openProfile('${d.id}')" style="background:var(--card-bg); padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid var(--border); cursor:pointer;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong style="color:var(--primary); font-size:15px;">${d.name}</strong>
                        <div style="color:var(--text-dim); font-size:11px; margin-top:4px;">${d.address || 'No address'}</div>
                    </div>
                    <div style="color:var(--text-dim); font-size:18px;">›</div>
                </div>
            </div>`).join("");
    }

    function renderGallery() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        let filtered = allData.filter(d => (d.name.toLowerCase().includes(query)) && (currentFilter === 'all' || d.status === currentFilter));
        
        filtered.sort((a, b) => {
            if (currentSort === 'name') return a.name.localeCompare(b.name);
            if (currentSort === 'sent') return new Date(b.date_sent || 0) - new Date(a.date_sent || 0);
            if (currentSort === 'received') return new Date(b.date_received || 0) - new Date(a.date_received || 0);
        });

        document.getElementById("galleryGrid").innerHTML = filtered.map(d => {
            const img = (d.images && d.images.length > 0) ? d.images[0] : 'https://via.placeholder.com/300?text=No+Photo';
            return `<div class="item-card" onclick="openProfile('${d.id}')">
                <img class="card-img" src="${img}" loading="lazy">
                <div class="card-content"><strong>${d.name}</strong></div>
            </div>`;
        }).join("");
    }

    async function openProfile(id) {
        currentItem = allData.find(x => x.id === id);
        switchView('profile', true);
        document.getElementById("p-name").innerText = currentItem.name;
        document.getElementById("p-role-input").value = currentItem.role_type || "";
        document.getElementById("p-known-input").value = currentItem.known_for || "";
        document.getElementById("p-notes").value = currentItem.address || "";
        document.getElementById("p-status-select").innerHTML = '<option value="pending">Pending</option><option value="received">Received</option><option value="rts">RTS</option>';
        document.getElementById("p-status-select").value = currentItem.status;
        document.getElementById("p-source-select").innerHTML = '<option value="TTM">TTM</option><option value="Purchased">Purchased</option>';
        document.getElementById("p-source-select").value = currentItem.source || "TTM";
        
        document.getElementById("p-sent-date").value = currentItem.date_sent || "";
        document.getElementById("p-received-date").value = currentItem.date_received || "";
        
        renderPhotoStrip();
    }

    function renderPhotoStrip() {
        const strip = document.getElementById("p-photo-strip"), main = document.getElementById("p-img");
        if(currentItem.images?.length > 0) {
            main.src = currentItem.images[0];
            strip.innerHTML = currentItem.images.map((img, i) => `<div class="strip-img-wrap"><img src="${img}" class="strip-img" onclick="document.getElementById('p-img').src='${img}'"></div>`).join("");
        } else { main.src = 'https://via.placeholder.com/400?text=No+Photos'; strip.innerHTML = ""; }
    }

    async function uploadToStorage(event) {
        const file = event.target.files[0];
        if (!file || !currentItem) return;

        const fileExt = file.name.split('.').pop();
        const fileName = `${currentItem.id}_${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { error: uploadError } = await sb.storage.from('autographs').upload(filePath, file);
        if (uploadError) {
            alert("Storage upload failed. Ensure your 'autographs' bucket has an insert policy configured.");
            console.error(uploadError);
            return;
        }

        const { data: publicUrlData } = sb.storage.from('autographs').getPublicUrl(filePath);
        const publicUrl = publicUrlData.publicUrl;

        const currentImages = currentItem.images || [];
        const updatedImages = [...currentImages, publicUrl];

        const { error: updateError } = await sb.from("Tracking").update({ images: updatedImages }).eq("id", currentItem.id);
        if (updateError) {
            console.error(updateError);
        } else {
            currentItem.images = updatedImages;
            renderPhotoStrip();
            loadData();
        }
    }

    async function updateField(col, val) {
        const finalVal = val === "" ? null : val;
        await sb.from("Tracking").update({ [col]: finalVal }).eq("id", currentItem.id);
        loadData();
    }

    function setFilter(val, el) {
        currentFilter = val;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active'); renderGallery();
    }

    function setSort(val) { 
        currentSort = val; 
        renderGallery(); 
    }

    function switchView(v, isProfile = false) {
        ['summary', 'profile', 'addresses', 'stats'].forEach(view => document.getElementById(`view-${view}`).style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${v}`).style.display = 'block';
        if(!isProfile) {
            const btnMap = {'summary': 'btn-summary', 'stats': 'btn-stats', 'addresses': 'btn-addresses'};
            if(btnMap[v]) document.getElementById(btnMap[v]).classList.add('active');
        }
        if(v === 'stats') renderChart();
        window.scrollTo(0,0);
    }

    function renderChart() {
        const ctx = document.getElementById('chartStatus').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { 
                labels: ['Received', 'Pending'], 
                datasets: [{ 
                    data: [allData.filter(d=>d.status==='received').length, allData.filter(d=>d.status==='pending').length], 
                    backgroundColor: ['#4ade80', '#38bdf8'], 
                    borderWidth: 0 
                }] 
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#f1f5f9' } } } }
        });
    }

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? "flex" : "none"; }
    
    async function addEntry() {
        const entry = { 
            name: document.getElementById("f_name").value, 
            role_type: document.getElementById("f_role").value, 
            address: document.getElementById("f_address").value, 
            status: 'pending', 
            images: [],
            date_sent: null,
            date_received: null
        };
        await sb.from("Tracking").insert([entry]);
        toggleModal('addModal', false); loadData();
    }
    async function deleteEntry() { if(confirm("Delete?")) { await sb.from("Tracking").delete().eq("id", currentItem.id); switchView('summary'); loadData(); } }
    loadData();
</script>
