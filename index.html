<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autograph Vault | Multi-Item Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --primary: #818cf8;
            --border: #334155; --text: #f1f5f9; --text-dim: #94a3b8;
            --received: #4ade80; --rts: #fb7185;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text); }
        
        .nav-bar { 
            background: rgba(30, 41, 59, 0.9); padding: 15px 40px; 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 40px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Grid for Multiple Items */
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .item-card { 
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); 
            overflow: hidden; transition: 0.3s; cursor: pointer;
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-img { width: 100%; aspect-ratio: 1/1; background: #000; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-name { font-weight: 700; font-size: 16px; margin-bottom: 5px; display: block; }
        .card-sub { color: var(--text-dim); font-size: 12px; }

        /* Profile Layout */
        .profile-grid { display: grid; grid-template-columns: 400px 1fr; gap: 40px; }
        .profile-img-container { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--border); }
        .profile-img-container img { width: 100%; display: block; }
        
        /* Upload Button Styling */
        .upload-label {
            display: inline-block; background: var(--primary); color: white; 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 15px;
        }
        #fileInput { display: none; }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        input, select, textarea { background: var(--bg-dark); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; width: 100%; box-sizing: border-box; margin-top: 5px;}
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); width: 450px; border-radius: 16px; padding: 30px; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div style="font-weight:900; color:var(--primary)">AUTOGRAPH VAULT</div>
    <div style="display:flex; gap:15px;">
        <button class="nav-item active" style="background:none; border:none; color:inherit; cursor:pointer;" onclick="switchView('summary')">COLLECTION</button>
        <button class="btn-primary" onclick="toggleModal('addModal', true)">+ ADD ITEM</button>
    </div>
</nav>

<div class="container">
    
    <div id="view-summary" class="view-section active">
        <div class="item-grid" id="galleryGrid">
            </div>
    </div>

    <div id="view-profile" class="view-section">
        <button onclick="switchView('summary')" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-bottom:20px; font-weight:700;">← BACK TO COLLECTION</button>
        
        <div class="profile-grid">
            <div>
                <div class="profile-img-container">
                    <img id="p-img" src="https://via.placeholder.com/400x500?text=No+Photo+Uploaded">
                </div>
                
                <label class="upload-label">
                    UPLOAD PHOTO
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
                </label>
                <p style="font-size:11px; color:var(--text-dim); margin-top:10px;">Select a file from your device to save to the vault.</p>
            </div>

            <div>
                <h1 id="p-name" style="margin:0"></h1>
                <p id="p-item" style="color:var(--primary); font-weight:700; font-size:18px; margin-top:5px;"></p>
                
                <div style="background:rgba(0,0,0,0.2); padding:20px; border-radius:12px; margin-top:20px;">
                    <h3 style="margin-top:0">Signer Bio</h3>
                    <p id="p-bio" style="color:var(--text-dim); line-height:1.6;">Loading...</p>
                </div>

                <div style="margin-top:25px;">
                    <label style="font-size:11px; font-weight:700; color:var(--text-dim)">PERSONAL NOTES</label>
                    <textarea id="p-notes" rows="4" onchange="updateNotes()" placeholder="Describe the item, how you got it, or certification numbers..."></textarea>
                </div>
                
                <button onclick="deleteEntry()" style="margin-top:40px; background:none; border:1px solid var(--rts); color:var(--rts); padding:8px 15px; border-radius:6px; cursor:pointer;">Delete This Item</button>
            </div>
        </div>
    </div>

</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <h2 style="margin-top:0">Add New Item</h2>
        <label>Signer Name</label>
        <input id="f_name" placeholder="e.g. Leah Remini">
        <label style="margin-top:15px; display:block;">Item Description</label>
        <input id="f_item" placeholder="e.g. 8x10 Signed Photo">
        <label style="margin-top:15px; display:block;">Source</label>
        <select id="f_source">
            <option>TTM</option><option>Purchased</option><option>In-Person</option>
        </select>
        
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:25px;">
            <button onclick="toggleModal('addModal', false)" style="background:none; border:none; color:var(--text-dim);">CANCEL</button>
            <button onclick="addEntry()" class="btn-primary">ADD TO VAULT</button>
        </div>
    </div>
</div>

<script>
    const sb = window.supabase.createClient("https://aeezsewfoozizduzuidv.supabase.co", "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz");
    const TMDB_KEY = "d4656a893658ed711bcadef18dc23300";
    let allData = [];
    let currentItem = null;

    async function loadData() {
        const { data } = await sb.from("Tracking").select("*").order('created_at', { ascending: false });
        allData = data || [];
        renderGallery();
    }

    function renderGallery() {
        const grid = document.getElementById("galleryGrid");
        grid.innerHTML = allData.map(d => `
            <div class="item-card" onclick="openProfile('${d.id}')">
                <img class="card-img" src="${d.img_url || 'https://via.placeholder.com/300?text=No+Image'}">
                <div class="card-info">
                    <span class="card-name">${d.name}</span>
                    <span class="card-sub">${d.item_type || 'Unknown Item'}</span>
                    <div style="margin-top:10px; font-size:10px; font-weight:700; color:${d.status==='received'?'var(--received)':'var(--primary)'}">
                        ${d.status.toUpperCase()} (${d.source})
                    </div>
                </div>
            </div>
        `).join("");
    }

    async function openProfile(id) {
        currentItem = allData.find(x => x.id === id);
        switchView('profile');
        
        document.getElementById("p-name").innerText = currentItem.name;
        document.getElementById("p-item").innerText = currentItem.item_type;
        document.getElementById("p-notes").value = currentItem.address || "";
        document.getElementById("p-img").src = currentItem.img_url || 'https://via.placeholder.com/400x500?text=No+Photo+Uploaded';

        // Get Bio
        document.getElementById("p-bio").innerText = "Searching biography...";
        const res = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_KEY}&query=${encodeURIComponent(currentItem.name)}`);
        const json = await res.json();
        if(json.results?.[0]) {
            const detail = await (await fetch(`https://api.themoviedb.org/3/person/${json.results[0].id}?api_key=${TMDB_KEY}`)).json();
            document.getElementById("p-bio").innerText = detail.biography || "Bio not available.";
        } else {
            document.getElementById("p-bio").innerText = "Actor details not found on TMDB.";
        }
    }

    // --- THE UPLOAD LOGIC ---
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            let imgData = e.target.result;
            
            // Update UI immediately
            document.getElementById("p-img").src = imgData;
            
            // Save to Supabase
            await sb.from("Tracking").update({ img_url: imgData }).eq("id", currentItem.id);
            loadData();
        };
        reader.readAsDataURL(file);
    }

    async function updateNotes() {
        const val = document.getElementById("p-notes").value;
        await sb.from("Tracking").update({ address: val }).eq("id", currentItem.id);
        loadData();
    }

    async function addEntry() {
        const entry = {
            name: document.getElementById("f_name").value,
            item_type: document.getElementById("f_item").value,
            source: document.getElementById("f_source").value,
            status: (document.getElementById("f_source").value === 'Purchased' ? 'received' : 'pending')
        };
        await sb.from("Tracking").insert([entry]);
        toggleModal('addModal', false);
        loadData();
    }

    async function deleteEntry() {
        if(confirm("Delete this item forever?")) {
            await sb.from("Tracking").delete().eq("id", currentItem.id);
            switchView('summary');
            loadData();
        }
    }

    function switchView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`view-${v}`).classList.add('active');
    }
    function toggleModal(id, show) { document.getElementById(id).style.display = show ? "block" : "none"; }

    loadData();
</script>
</body>
</html>
