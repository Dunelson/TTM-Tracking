<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Tracking: Pro Dark</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #818cf8;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --pending: #38bdf8;
            --received: #4ade80;
            --rts: #fb7185;
            --unsigned: #fbbf24;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: var(--bg-dark); color: var(--text); overflow-x: hidden; }
        
        .nav-bar { 
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-weight: 800; font-size: 18px; color: var(--primary); }
        .nav-links { display: flex; gap: 10px; }
        .nav-item { 
            color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer;
            padding: 8px 16px; border-radius: 8px; transition: 0.2s;
        }
        .nav-item.active { color: var(--text); background: var(--border); }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 40px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-label { color: var(--text-dim); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 32px; font-weight: 800; display: block; margin-top: 5px; font-family: 'JetBrains Mono'; }

        .data-container { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .controls { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .search-input { flex: 1; background: var(--bg-dark); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: rgba(0,0,0,0.2); color: var(--text-dim); font-size: 11px; text-transform: uppercase; cursor: pointer; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .badge-select { background: none; border: 1px solid var(--border); color: inherit; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .inline-input { background: none; border: 1px solid transparent; color: white; padding: 4px; border-radius: 4px; width: 130px; font-family: inherit; font-size: 12px; }
        .inline-input:focus { border-color: var(--primary); background: var(--bg-dark); outline: none; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); width: 500px; border-radius: 16px; padding: 30px; border: 1px solid var(--border); }

        .view-section { display: none; }
        .view-section.active { display: block; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .actor-link { color: var(--primary); font-weight: 600; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="nav-left">
        <div class="logo">NELSON TRACKING</div>
        <div class="nav-links">
            <div id="nav-summary" class="nav-item active" onclick="switchView('summary')">SUMMARY</div>
            <div id="nav-analytics" class="nav-item" onclick="switchView('analytics')">ANALYTICS</div>
            <div id="nav-addresses" class="nav-item" onclick="switchView('addresses')">ADDRESSES</div>
        </div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="nav-item" onclick="document.getElementById('csvFile').click()">IMPORT</button>
        <button class="btn-primary" onclick="toggleModal('addModal', true)">+ ADD ENTRY</button>
    </div>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-label" style="color:var(--pending)">Pending</span><span class="stat-value" id="countPending">0</span></div>
        <div class="stat-card"><span class="stat-label" style="color:var(--received)">Received</span><span class="stat-value" id="countReceived">0</span></div>
        <div class="stat-card"><span class="stat-label" style="color:var(--rts)">RTS</span><span class="stat-value" id="countRTS">0</span></div>
        <div class="stat-card"><span class="stat-label" style="color:var(--unsigned)">Unsigned</span><span class="stat-value" id="countUnsigned">0</span></div>
    </div>

    <div id="view-summary" class="view-section active">
        <div class="data-container">
            <div class="controls"><input type="text" class="search-input" id="searchBar" placeholder="Search recipients or categories..." oninput="applyFilters()"></div>
            <table>
                <thead>
                    <tr>
                        <th onclick="setSort('name')">Recipient ↕</th>
                        <th onclick="setSort('role_type')">Category ↕</th>
                        <th onclick="setSort('date_sent')">Sent ↕</th>
                        <th>Status</th>
                        <th onclick="setSort('date_received')">Received ↕</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="mainTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-analytics" class="view-section">
        <div class="charts-row" style="margin-bottom:20px;">
            <div class="stat-card">
                <h3 style="margin:0 0 15px 0; font-size:12px; color:var(--text-dim)">STATUS BREAKDOWN</h3>
                <canvas id="statusDoughnut"></canvas>
            </div>
            <div class="stat-card">
                <h3 style="margin:0 0 15px 0; font-size:12px; color:var(--text-dim)">BY CATEGORY</h3>
                <canvas id="categoryBar"></canvas>
            </div>
        </div>
        <div class="stat-card">
            <h3 style="margin:0 0 15px 0; font-size:12px; color:var(--text-dim)">TOTAL VOLUME</h3>
            <canvas id="volumeChart" height="100"></canvas>
        </div>
    </div>

    <div id="view-addresses" class="view-section">
        <div class="data-container">
            <table>
                <thead><tr><th onclick="setSort('name')">Name ↕</th><th>Full Mailing Address</th></tr></thead>
                <tbody id="addressTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <h2 style="margin:0 0 20px 0; color:var(--primary)">NEW REQUEST</h2>
        <div style="margin-bottom:15px"><label class="stat-label">Name</label><input id="f_name"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px">
            <div><label class="stat-label">Category</label>
                <select id="f_role" style="background:var(--bg-dark); color:white; border:1px solid var(--border); padding:10px; border-radius:8px; width:100%">
                    <option>Actor</option><option>Director</option><option>Comedian</option>
                    <option>Politician</option><option>Producer</option><option>Composer</option>
                    <option>Musician</option><option>Athlete</option>
                </select>
            </div>
            <div><label class="stat-label">Sent Date</label><input type="date" id="f_datesent" style="background:var(--bg-dark); color:white; border:1px solid var(--border); padding:10px; border-radius:8px; width:100%"></div>
        </div>
        <div style="margin-bottom:20px"><label class="stat-label">Address</label><textarea id="f_address" rows="3" style="background:var(--bg-dark); color:white; border:1px solid var(--border); border-radius:8px; width:100%"></textarea></div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="toggleModal('addModal', false)" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">CANCEL</button>
            <button onclick="addEntry()" class="btn-primary">SAVE ENTRY</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="infoModal">
    <div class="modal-content">
        <h2 id="modalName" style="margin:0 0 15px 0; color:var(--primary)"></h2>
        <div id="modalBio" style="font-size:14px; line-height:1.6; max-height:300px; overflow-y:auto; color:var(--text-dim)"></div>
        <div style="margin-top:20px; text-align:right;"><button onclick="toggleModal('infoModal', false)" class="btn-primary">CLOSE</button></div>
    </div>
</div>

<input type="file" id="csvFile" style="display:none;" onchange="uploadCSV()">

<script>
    const sb = window.supabase.createClient("https://aeezsewfoozizduzuidv.supabase.co", "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz");
    const TMDB_KEY = "d4656a893658ed711bcadef18dc23300";
    let allData = [];
    let sortState = { col: 'created_at', dir: 'desc' };
    let charts = {};

    async function loadData() {
        const { data: rows } = await sb.from("Tracking").select("*");
        allData = rows || [];
        applyFilters();
        updateStats();
        if(document.getElementById('view-analytics').classList.contains('active')) renderCharts();
    }

    function applyFilters() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        let filtered = allData.filter(d => 
            (d.name?.toLowerCase().includes(query)) || 
            (d.role_type?.toLowerCase().includes(query))
        );
        
        filtered.sort((a, b) => {
            let valA = (a[sortState.col] || '').toString().toLowerCase();
            let valB = (b[sortState.col] || '').toString().toLowerCase();
            return sortState.dir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });

        renderTables(filtered);
    }

    function renderTables(data) {
        document.getElementById("mainTableBody").innerHTML = data.map(d => `
            <tr>
                <td><span class="actor-link" onclick="openBio('${d.name}')">${d.name}</span></td>
                <td style="color:var(--text-dim)">${d.role_type}</td>
                <td><input type="date" class="inline-input" value="${d.date_sent || ''}" onchange="updateField('${d.id}', 'date_sent', this.value)"></td>
                <td>
                    <select class="badge-select" onchange="updateStatus('${d.id}', this.value)" style="color:${getStatusColor(d.status)}">
                        <option value="pending" ${d.status==='pending'?'selected':''}>Pending</option>
                        <option value="received" ${d.status==='received'?'selected':''}>Received</option>
                        <option value="rts" ${d.status==='rts'?'selected':''}>RTS</option>
                        <option value="unsigned" ${d.status==='unsigned'?'selected':''}>Unsigned</option>
                    </select>
                </td>
                <td><input type="date" class="inline-input" value="${d.date_received || ''}" onchange="updateField('${d.id}', 'date_received', this.value)"></td>
                <td><button onclick="deleteEntry('${d.id}')" style="color:var(--rts); background:none; border:none; cursor:pointer;">✕</button></td>
            </tr>
        `).join("");

        document.getElementById("addressTableBody").innerHTML = data.map(d => `
            <tr><td style="font-weight:600">${d.name}</td><td style="color:var(--text-dim); font-family: 'JetBrains Mono'">${d.address || '—'}</td></tr>
        `).join("");
    }

    function getStatusColor(status) {
        if(status === 'pending') return 'var(--pending)';
        if(status === 'received') return 'var(--received)';
        if(status === 'rts') return 'var(--rts)';
        return 'var(--unsigned)';
    }

    async function openBio(name) {
        toggleModal('infoModal', true);
        document.getElementById("modalName").innerText = name;
        document.getElementById("modalBio").innerText = "Searching TMDB...";
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_KEY}&query=${encodeURIComponent(name)}`);
            const json = await res.json();
            if (json.results?.[0]) {
                const dRes = await fetch(`https://api.themoviedb.org/3/person/${json.results[0].id}?api_key=${TMDB_KEY}`);
                const details = await dRes.json();
                document.getElementById("modalBio").innerText = details.biography || "No biography found.";
            } else { document.getElementById("modalBio").innerText = "No actor found."; }
        } catch { document.getElementById("modalBio").innerText = "Error loading info."; }
    }

    function setSort(col) {
        sortState.dir = (sortState.col === col && sortState.dir === 'asc') ? 'desc' : 'asc';
        sortState.col = col;
        applyFilters();
    }

    async function updateStatus(id, status) {
        const val = { status };
        if(status === 'received') val.date_received = new Date().toISOString().split('T')[0];
        await sb.from("Tracking").update(val).eq("id", id);
        loadData();
    }

    async function updateField(id, field, value) {
        const val = {}; val[field] = value;
        await sb.from("Tracking").update(val).eq("id", id);
        loadData();
    }

    async function addEntry() {
        await sb.from("Tracking").insert([{
            name: document.getElementById("f_name").value,
            role_type: document.getElementById("f_role").value,
            date_sent: document.getElementById("f_datesent").value || null,
            address: document.getElementById("f_address").value,
            status: 'pending'
        }]);
        toggleModal('addModal', false);
        loadData();
    }

    async function deleteEntry(id) { if(confirm("Delete?")) { await sb.from("Tracking").delete().eq("id", id); loadData(); } }

    function switchView(view) {
        document.querySelectorAll('.view-section, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
        document.getElementById(`nav-${view}`).classList.add('active');
        if(view === 'analytics') renderCharts();
    }

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? "block" : "none"; }

    function updateStats() {
        const s = { pending: 0, received: 0, rts: 0, unsigned: 0 };
        allData.forEach(d => s[d.status || 'pending']++);
        ['Pending', 'Received', 'RTS', 'Unsigned'].forEach(k => document.getElementById(`count${k}`).innerText = s[k.toLowerCase()]);
    }

    function renderCharts() {
        const s = { pending: 0, received: 0, rts: 0, unsigned: 0 };
        const cats = {};
        allData.forEach(d => {
            s[d.status || 'pending']++;
            cats[d.role_type] = (cats[d.role_type] || 0) + 1;
        });
        
        if(charts.doughnut) charts.doughnut.destroy();
        charts.doughnut = new Chart(document.getElementById('statusDoughnut'), {
            type: 'doughnut',
            data: {
                labels: ['Pending', 'Received', 'RTS', 'Unsigned'],
                datasets: [{ data: [s.pending, s.received, s.rts, s.unsigned], backgroundColor: ['#38bdf8', '#4ade80', '#fb7185', '#fbbf24'], borderWidth: 0 }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
        });

        if(charts.catBar) charts.catBar.destroy();
        charts.catBar = new Chart(document.getElementById('categoryBar'), {
            type: 'bar',
            data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: '#818cf8', borderRadius: 4 }] },
            options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } } }
        });

        if(charts.bar) charts.bar.destroy();
        charts.bar = new Chart(document.getElementById('volumeChart'), {
            type: 'line',
            data: { labels: ['Total Tracked'], datasets: [{ label: 'Entries', data: [allData.length], borderColor: '#818cf8', fill: true, backgroundColor: 'rgba(129, 140, 248, 0.1)' }] },
            options: { scales: { y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } } }
        });
    }

    async function uploadCSV() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return;
        Papa.parse(file, {
            header: true, skipEmptyLines: true,
            complete: async (res) => {
                const clean = res.data.filter(r => r.name).map(r => ({
                    name: r.name, address: r.address || "", role_type: r.role_type || "Actor", 
                    date_sent: r.date_sent || null, status: 'pending'
                }));
                await sb.from("Tracking").insert(clean); loadData();
            }
        });
    }

    loadData();
</script>
</body>
</html>
