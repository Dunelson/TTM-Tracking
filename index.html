<div id="view-analytics" class="view-section">
    <div class="charts-row" style="margin-bottom: 20px;">
        <div class="stat-card">
            <h3 style="margin:0 0 15px 0; font-size:12px; color:var(--text-dim)">STATUS BREAKDOWN</h3>
            <canvas id="statusDoughnut" height="250"></canvas>
        </div>
        <div class="stat-card">
            <h3 style="margin:0 0 15px 0; font-size:12px; color:var(--text-dim)">VOLUME BY CATEGORY</h3>
            <canvas id="categoryBar" height="250"></canvas>
        </div>
    </div>
    <div class="stat-card">
        <h3 style="margin:0 0 15px 0; font-size:12px; color:var(--text-dim)">MONTHLY ACTIVITY</h3>
        <canvas id="volumeChart" height="100"></canvas>
    </div>
</div>

<script>
    // ... (Keep your existing Supabase init and global variables)

    function renderCharts() {
        const stats = { pending: 0, received: 0, rts: 0, unsigned: 0 };
        const cats = {};
        
        allData.forEach(d => {
            // Count Statuses
            const s = d.status?.toLowerCase() || 'pending';
            if(stats.hasOwnProperty(s)) stats[s]++;
            
            // Count Categories
            const c = d.role_type || 'Other';
            cats[c] = (cats[c] || 0) + 1;
        });

        // 1. Status Doughnut (The one that was broken)
        if(charts.doughnut) charts.doughnut.destroy();
        charts.doughnut = new Chart(document.getElementById('statusDoughnut'), {
            type: 'doughnut',
            data: {
                labels: ['Pending', 'Received', 'RTS', 'Unsigned'],
                datasets: [{
                    data: [stats.pending, stats.received, stats.rts, stats.unsigned],
                    backgroundColor: ['#38bdf8', '#4ade80', '#fb7185', '#fbbf24'],
                    hoverOffset: 10,
                    borderWidth: 0
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20, font: { size: 11 } } }
                },
                cutout: '70%'
            }
        });

        // 2. Category Bar Chart (Random Extra)
        if(charts.catBar) charts.catBar.destroy();
        charts.catBar = new Chart(document.getElementById('categoryBar'), {
            type: 'bar',
            data: {
                labels: Object.keys(cats),
                datasets: [{
                    label: 'Requests',
                    data: Object.values(cats),
                    backgroundColor: '#818cf8',
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } },
                    y: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 3. Monthly Volume Chart
        if(charts.bar) charts.bar.destroy();
        charts.bar = new Chart(document.getElementById('volumeChart'), {
            type: 'line',
            data: {
                labels: ['Total'],
                datasets: [{
                    label: 'Total Requests',
                    data: [allData.length],
                    borderColor: '#818cf8',
                    backgroundColor: 'rgba(129, 140, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // Ensure updateStatus and updateField refresh charts
    async function updateStatus(id, status) {
        const val = { status };
        if(status === 'received') val.date_received = new Date().toISOString().split('T')[0];
        await sb.from("Tracking").update(val).eq("id", id);
        await loadData(); // Reloads data AND calls applyFilters/updateStats
        if(document.getElementById('view-analytics').classList.contains('active')) renderCharts();
    }

    // ... (Rest of your script)
</script>
