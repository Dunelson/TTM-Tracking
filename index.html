<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelson Tracking: Dark Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #818cf8;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --pending: #38bdf8;
            --received: #4ade80;
            --rts: #fb7185;
            --unsigned: #fbbf24;
        }

        body { 
            font-family: 'Inter', sans-serif; margin: 0; padding: 0; 
            background: var(--bg-dark); color: var(--text); 
            line-height: 1.5;
        }

        /* Navigation */
        .nav-bar { 
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .logo { font-weight: 800; font-size: 20px; color: var(--primary); letter-spacing: -0.5px; }
        .nav-links { display: flex; gap: 15px; }
        .nav-item { 
            color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer;
            padding: 8px 16px; border-radius: 8px; transition: 0.3s;
        }
        .nav-item:hover { color: var(--text); background: var(--border); }
        .nav-item.active { color: var(--text); background: var(--primary); }

        .btn-add { 
            background: var(--primary); color: white; border: none; padding: 10px 22px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4); }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 40px; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card-bg); padding: 25px; border-radius: 16px; 
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
        #card-pending::after { background: var(--pending); }
        #card-received::after { background: var(--received); }
        #card-rts::after { background: var(--rts); }
        #card-unsigned::after { background: var(--unsigned); }

        .stat-label { color: var(--text-dim); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 36px; font-weight: 800; display: block; margin-top: 5px; font-family: 'JetBrains Mono', monospace; }

        /* Table & Data */
        .data-container { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .search-area { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
        .search-input { 
            flex: 1; background: var(--bg-dark); border: 1px solid var(--border); 
            padding: 12px 20px; border-radius: 10px; color: white; font-size: 14px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; padding: 18px; background: rgba(15, 23, 42, 0.5); 
            color: var(--text-dim); font-size: 11px; text-transform: uppercase; 
            cursor: pointer; user-select: none;
        }
        th:hover { color: var(--primary); }
        td { padding: 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; }
        .bg-pending { background: rgba(56, 189, 248, 0.1); color: var(--pending); }
        .bg-received { background: rgba(74, 222, 128, 0.1); color: var(--received); }
        .bg-rts { background: rgba(251, 113, 133, 0.1); color: var(--rts); }
        .bg-unsigned { background: rgba(251, 191, 36, 0.1); color: var(--unsigned); }

        .actor-link { color: var(--primary); font-weight: 700; text-decoration: none; cursor: pointer; }
        
        /* Modal - Dark */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; }
        .modal-content { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--card-bg); width: 550px; border-radius: 20px; border: 1px solid var(--border);
            padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        input, select, textarea { 
            background: var(--bg-dark); border: 1px solid var(--border); 
            padding: 12px; border-radius: 8px; color: white; width: 100%; margin-top: 5px;
        }

        .random-fact-box {
            margin-top: 20px; padding: 15px; border-radius: 12px; 
            background: linear-gradient(45deg, #1e293b, #334155); 
            font-size: 12px; color: var(--text-dim); font-style: italic;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="nav-left">
        <div class="logo">NELSON TRACKING //</div>
        <div class="nav-links">
            <div id="nav-summary" class="nav-item active" onclick="switchView('summary')">DASHBOARD</div>
            <div id="nav-analytics" class="nav-item" onclick="switchView('analytics')">STATS</div>
            <div id="nav-addresses" class="nav-item" onclick="switchView('addresses')">DIRECTORY</div>
        </div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="nav-item" style="border:1px solid var(--border)" onclick="exportCSV()">EXPORT</button>
        <button class="btn-add" onclick="toggleModal('addModal', true)">+ NEW REQUEST</button>
    </div>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card" id="card-pending"><span class="stat-label">Pending</span><span class="stat-value" id="countPending">0</span></div>
        <div class="stat-card" id="card-received"><span class="stat-label">Received</span><span class="stat-value" id="countReceived">0</span></div>
        <div class="stat-card" id="card-rts"><span class="stat-label">RTS</span><span class="stat-value" id="countRTS">0</span></div>
        <div class="stat-card" id="card-unsigned"><span class="stat-label">Unsigned</span><span class="stat-value" id="countUnsigned">0</span></div>
    </div>

    <div id="view-summary" class="view-section active">
        <div class="data-container">
            <div class="search-area">
                <input type="text" class="search-input" id="searchBar" placeholder="Search names, movies, or categories..." oninput="filterData()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th onclick="resortData('name')">Recipient ↕</th>
                        <th onclick="resortData('role_type')">Category ↕</th>
                        <th onclick="resortData('date_sent')">Sent ↕</th>
                        <th onclick="resortData('status')">Status ↕</th>
                        <th onclick="resortData('date_received')">Received ↕</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="mainTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="view-analytics" class="view-section">
        <div style="display:grid; grid-template-columns: 2fr 1fr; gap: 20px;">
            <div class="stat-card"><canvas id="volumeChart"></canvas></div>
            <div class="stat-card"><canvas id="statusDoughnut"></canvas></div>
        </div>
    </div>

    <div id="view-addresses" class="view-section">
        <div class="data-container">
            <table>
                <thead>
                    <tr>
                        <th onclick="resortData('name')">Name</th>
                        <th>Full Mailing Address</th>
                    </tr>
                </thead>
                <tbody id="addressTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="random-fact-box" id="randomFact">"Loading a random tip..."</div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <h2 style="margin:0 0 20px 0; color:var(--primary)">NEW TRACKING ENTRY</h2>
        <div style="margin-bottom:15px"><label class="stat-label">Subject Name</label><input id="f_name"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px">
            <div><label class="stat-label">Category</label>
                <select id="f_role">
                    <option value="Actor">Actor</option><option value="Director">Director</option>
                    <option value="Comedian">Comedian</option><option value="Musician">Musician</option>
                    <option value="Athlete">Athlete</option>
                </select>
            </div>
            <div><label class="stat-label">Sent Date</label><input type="date" id="f_datesent"></div>
        </div>
        <div style="margin-bottom:20px"><label class="stat-label">Address</label><textarea id="f_address" rows="3"></textarea></div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="toggleModal('addModal', false)" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">CANCEL</button>
            <button onclick="addEntry()" class="btn-add">SAVE ENTRY</button>
        </div>
    </div>
</div>

<script>
    const sb = window.supabase.createClient("https://aeezsewfoozizduzuidv.supabase.co", "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz");
    const TMDB_KEY = "d4656a893658ed711bcadef18dc23300";
    let allData = [];
    let sortState = { col: 'created_at', dir: 'desc' };

    const facts = [
        "Pro tip: Including a self-addressed stamped envelope (SASE) increases success rates by 60%.",
        "Did you know? Tom Hanks is known as one of the best TTM signers in Hollywood.",
        "Always use archival-quality pens to prevent ink fading over decades.",
        "Check your addresses twice—RTS is the ultimate collector's nightmare."
    ];

    async function loadData() {
        const { data: rows } = await sb.from("Tracking").select("*");
        allData = rows || [];
        document.getElementById("randomFact").innerText = facts[Math.floor(Math.random() * facts.length)];
        applySortAndRender();
        updateStats();
    }

    function applySortAndRender() {
        const query = document.getElementById("searchBar").value.toLowerCase();
        let displayData = allData.filter(d => d.name?.toLowerCase().includes(query) || d.role_type?.toLowerCase().includes(query));
        
        displayData.sort((a, b) => {
            let valA = a[sortState.col] || '';
            let valB = b[sortState.col] || '';
            return sortState.dir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });

        document.getElementById("mainTableBody").innerHTML = displayData.map(d => `
            <tr>
                <td><span class="actor-link" onclick="openBio('${d.name}')">${d.name}</span></td>
                <td style="color:var(--text-dim)">${d.role_type}</td>
                <td>${d.date_sent || '—'}</td>
                <td><span class="badge bg-${d.status}">${d.status}</span></td>
                <td>${d.date_received || '—'}</td>
                <td><button onclick="deleteEntry('${d.id}')" style="color:var(--rts); background:none; border:none; cursor:pointer;">✕</button></td>
            </tr>
        `).join("");

        document.getElementById("addressTableBody").innerHTML = displayData.map(d => `
            <tr><td>${d.name}</td><td style="color:var(--text-dim); font-family:monospace">${d.address || 'N/A'}</td></tr>
        `).join("");
    }

    function resortData(col) {
        sortState.dir = (sortState.col === col && sortState.dir === 'asc') ? 'desc' : 'asc';
        sortState.col = col;
        applySortAndRender();
    }

    function filterData() { applySortAndRender(); }
    function switchView(view) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
        document.getElementById(`nav-${view}`).classList.add('active');
    }

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? "block" : "none"; }

    async function addEntry() {
        const name = document.getElementById("f_name").value;
        if(!name) return;
        await sb.from("Tracking").insert([{
            name, address: document.getElementById("f_address").value,
            role_type: document.getElementById("f_role").value,
            date_sent: document.getElementById("f_datesent").value || null,
            status: "pending"
        }]);
        toggleModal('addModal', false);
        loadData();
    }

    async function deleteEntry(id) { if(confirm("Delete?")) { await sb.from("Tracking").delete().eq("id", id); loadData(); } }

    function updateStats() {
        const s = { pending: 0, received: 0, rts: 0, unsigned: 0 };
        allData.forEach(d => s[d.status || "pending"]++);
        ['Pending', 'Received', 'RTS', 'Unsigned'].forEach(k => document.getElementById(`count${k}`).innerText = s[k.toLowerCase()]);
    }

    loadData();
</script>
</body>
</html>
